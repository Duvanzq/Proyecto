<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Mascota Minecraft</title>
  <script src="/static/chat.js" defer></script>
  <style>
    body{font-family:Arial, sans-serif;max-width:820px;margin:2rem auto}
    #messages{border:1px solid #ccc;padding:1rem;height:320px;overflow:auto;background:#f7f7f7}
    .me{color:#0b62a4;margin:6px 0}
    .bot{color:#166534;margin:6px 0}
    #input{width:60%}
    #send{width:20%}
    #kb-panel{margin-top:12px;border:1px dashed #999;padding:8px}
  </style>
</head>
<body>
  <h1>Mascota Minecraft (Minetico)</h1>
  <div id="pet-info">Cargando mascota...</div>

  <div id="messages"></div>
  <div style="margin-top:8px">
    <input id="input" placeholder="Escribe algo sobre Minecraft..." />
    <button id="send">Enviar</button>
  </div>

  <div id="kb-panel">
    <h3>KB (fichas)</h3>
    <form id="kb-form">
      <input id="kb-term" placeholder="término (ej: diamante)" />
      <input id="kb-text" placeholder="texto (breve)" style="width:60%" />
      <button type="submit">Añadir/Actualizar ficha</button>
    </form>
    <hr/>
    <form id="kb-upload-form" enctype="multipart/form-data">
      <input type="file" id="kb-file" accept=".json" />
      <button type="submit">Subir JSON (reemplaza KB)</button>
    </form>
    <div id="kb-list"></div>
  </div>
</body>
</html>
