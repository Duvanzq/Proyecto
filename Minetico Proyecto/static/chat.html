<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Mascota Minecraft</title>
  <script src="/static/chat.js" defer></script>
  <style>
    body{font-family:Arial, sans-serif;max-width:700px;margin:2rem auto}
    #messages{border:1px solid #ccc;padding:1rem;height:320px;overflow:auto;background:#f7f7f7}
    .me{color:#0b62a4;margin:6px 0}
    .bot{color:#166534;margin:6px 0}
    #input{width:72%}
    #send{width:24%}
  </style>
</head>
<body>
  <h1>Mascota Minecraft (prototipo)</h1>
  <div id="messages"></div>
  <div style="margin-top:8px">
    <input id="input" placeholder="Escribe algo sobre Minecraft..." />
    <button id="send">Enviar</button>
  </div>
</body>
</html>
